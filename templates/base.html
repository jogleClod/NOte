<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NoteVault – {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
{% if session.username %}
<nav>
    <span class="brand">📒 NoteVault</span>
    <span>Hi, <b>{{ session.username }}</b></span>
    <a href="{{ url_for('logout') }}">Logout</a>
</nav>
{% endif %}
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
